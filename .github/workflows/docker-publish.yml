name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      aztec_version:
        description: "Aztec base image version (e.g. 4.2.0-aztecnr-rc.2)"
        required: true
        type: string
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "contracts/**"
      - ".github/workflows/docker-publish.yml"

env:
  IMAGE_NAME: nethermind/aztec-starter

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Determine version and tags
        id: meta
        run: |
          # Aztec version: from workflow input, from git tag, or from the Dockerfile default.
          if [ -n "${{ inputs.aztec_version }}" ]; then
            VERSION="${{ inputs.aztec_version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Read the default from the Dockerfile so we never accidentally pass "latest"
            VERSION=$(grep -m1 'ARG AZTEC_VERSION=' Dockerfile | cut -d= -f2)
          fi
          echo "aztec_version=$VERSION" >> "$GITHUB_OUTPUT"

          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          # Build the tag list
          TAGS="${IMAGE_NAME}:${SHORT_SHA},${IMAGE_NAME}:${VERSION}"
          # Tag as latest on main branch pushes
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            AZTEC_VERSION=${{ steps.meta.outputs.aztec_version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
